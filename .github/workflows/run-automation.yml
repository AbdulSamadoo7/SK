name: Run Selenium Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Xvfb)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation Script
        run: xvfb-run --auto-servernum python sk_automation.py

      - name: Upload Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_screenshot
          path: error_screenshot.png

      - name: Send Error Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.EMAIL_USERNAME}}
          password: ${{secrets.EMAIL_PASSWORD}}
          subject: GitHub Actions Automation Failed
          to: ${{secrets.EMAIL_TO}}
          from: GitHub Actions Automation
          body: The Schoolknot automation script failed. See the attached screenshot for the exact step where the error occurred.
          attachments: error_screenshot.png
